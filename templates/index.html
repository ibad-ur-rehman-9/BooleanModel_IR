<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IR Search Engine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.4rem;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .header h1 span { color: #e63946; }

    .header p {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #666;
      font-weight: 300;
    }

    .search-box {
      width: 100%;
      max-width: 680px;
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    .search-box input:focus { border-color: #e63946; }

    .search-box button {
      padding: 14px 28px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-box button:hover { background: #c1121f; }

    .examples {
      width: 100%;
      max-width: 680px;
      margin-bottom: 36px;
    }

    .examples p {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 5px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: #e63946;
      color: #e63946;
    }

    .results-area {
      width: 100%;
      max-width: 680px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .results-header h2 {
      font-size: 0.85rem;
      color: #555;
      font-weight: 400;
    }

    .results-header .count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #e63946;
    }

    .doc-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .doc-card {
      padding: 10px 18px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #ccc;
      transition: all 0.2s;
    }

    .doc-card:hover {
      border-color: #e63946;
      color: #fff;
    }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #444;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #555;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>IR <span>Search</span> Engine</h1>
    <p>Boolean &amp; Proximity Retrieval · Trump Speeches Corpus · CS4051</p>
  </div>

  <div class="search-box">
    <input type="text" id="queryInput" placeholder='e.g.  united OR plane  /  keep out /2' />
    <button onclick="runSearch()">Search</button>
  </div>

  <div class="examples">
    <p>Try an example query:</p>
    <div class="chips">
      <span class="chip" onclick="setQuery('running')">running</span>
      <span class="chip" onclick="setQuery('NOT hammer')">NOT hammer</span>
      <span class="chip" onclick="setQuery('actions AND wanted')">actions AND wanted</span>
      <span class="chip" onclick="setQuery('united OR plane')">united OR plane</span>
      <span class="chip" onclick="setQuery('biggest AND (near OR box)')">biggest AND (near OR box)</span>
      <span class="chip" onclick="setQuery('after years /1')">after years /1</span>
      <span class="chip" onclick="setQuery('keep out /2')">keep out /2</span>
      <span class="chip" onclick="setQuery('Hillary Clinton')">Hillary Clinton</span>
    </div>
  </div>

  <div class="results-area" id="resultsArea"></div>

  <script>
    const input = document.getElementById('queryInput');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') runSearch();
    });

    function setQuery(q) {
      input.value = q;
      runSearch();
    }

    async function runSearch() {
      const query = input.value.trim();
      if (!query) return;

      const area = document.getElementById('resultsArea');
      area.innerHTML = '<div class="loading">searching...</div>';

      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        renderResults(data);
      } catch (err) {
        area.innerHTML = '<div class="no-results">Something went wrong. Is Flask running?</div>';
      }
    }

    function renderResults(data) {
      const area = document.getElementById('resultsArea');

      if (data.results.length === 0) {
        area.innerHTML = '<div class="no-results">No documents matched your query.</div>';
        return;
      }

      let html = `
        <div class="results-header">
          <h2>Results for &nbsp;<strong style="color:#fff">${escapeHtml(data.query)}</strong></h2>
          <span class="count">${data.count} docs</span>
        </div>
        <div class="doc-grid">
      `;
      data.results.forEach(id => {
        html += `<div class="doc-card">speech_${id}.txt</div>`;
      });
      html += '</div>';
      area.innerHTML = html;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>

</body>
</html>
